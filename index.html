<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Isaac ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Destellos -->
    <div id="estrellas"></div>

    <!-- Portada -->
    <section class="pantalla" id="inicio">

        <div class="tarjeta">

            <img src="Img/portada.jpg" alt="Isaac" class="fotoPortada">

            <p class="detalle">
                Un pequeño detalle para ti...
            </p>

            <h1>Feliz cumpleaños</h1>

            <h2>Isaac ❤️</h2>

            <p class="frase">

                Para la persona que quiero mucho
                

            </p>

            <button id="comenzar">

                 Comenzar

            </button>

        </div>

    </section>



    <!-- Sobre -->

    <section class="pantalla oculto" id="pantallaSobre">

        <div class="sobre">

            <div class="tapa"></div>

            <div class="cuerpo"></div>

            <div class="sello" id="abrirSobre">
                ❤️
            </div>

        </div>

        <p class="textoSobre">

            Tengo algo que decirte...

        </p>

    </section>



    <!-- Carta -->

    <section class="pantalla oculto" id="pantallaCarta">

        <div class="papel">

            <h2>Hola, emosho. ❤️</h2>

            <p id="textoCarta"></p>

        </div>

    </section>



    <script src="script.js"></script>

</body>

</html>
